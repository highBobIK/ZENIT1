        .header {

        }

            opacity: 1;
        }
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
        }
        .auth-container {
            background-color: rgba(10, 20, 40, 0.65); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
        }

        .auth-title {
            text-align: center;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 26px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background-color: rgba(20, 30, 50, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            outline: none;
            border-color: #d4af37; 
            box-shadow: 0 0 10px 2px rgba(212, 175, 55, 0.2);
        }
        .auth-button {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #001a47;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.3s ease, color 0.3s ease;
            margin-top: 10px;
        }

        .auth-button:hover {
            background: #cda066; 
            color: #ffffff;
        }

        .auth-links {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #a0aec0;
        }

        .auth-links a {
            color: #cda066; 
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-links a:hover {
            color: #ffffff;
        }
        
    </style>
</head>

    <script>
        var TxtType = function(el, toRotate, period) {
            this.toRotate = toRotate;
            this.el = el;
            this.loopNum = 0;
            this.period = parseInt(period, 10) || 2000;
            this.txt = '';
            this.tick();
            this.isDeleting = false;
        };

        TxtType.prototype.tick = function() {
            var i = this.loopNum % this.toRotate.length;
            var fullTxt = this.toRotate[i];

            if (this.isDeleting) {
                this.txt = fullTxt.substring(0, this.txt.length - 1);
            } else {
                this.txt = fullTxt.substring(0, this.txt.length + 1);
            }

            this.el.innerHTML = '<span class="wrap">'+this.txt+'</span>';

            var that = this;
            var delta = 200 - Math.random() * 100;

            if (this.isDeleting) { delta /= 2; }

            if (!this.isDeleting && this.txt === fullTxt) {
                delta = this.period;
                this.isDeleting = true;
            } else if (this.isDeleting && this.txt === '') {
                this.isDeleting = false;
                this.loopNum++;
                delta = 500;
            }

            setTimeout(function() {
                that.tick();
            }, delta);
        };

        window.onload = function() {
            var elements = document.getElementsByClassName('typewrite');
            for (var i=0; i<elements.length; i++) {
                var toRotate = elements[i].getAttribute('data-type');
                var period = elements[i].getAttribute('data-period');
                if (toRotate) {
                  new TxtType(elements[i], JSON.parse(toRotate), period);
                }
            }
            // INJECT CSS
            var css = document.createElement("style");
            css.type = "text/css";
            css.innerHTML = ".typewrite > .wrap { border-right: 0.08em solid #fff}";
            document.body.appendChild(css);
        };

document.addEventListener('DOMContentLoaded', () => {
    const loginBtn = document.getElementById('login-btn');
    const alertBox = document.getElementById('custom-alert');
    const closeBtn = document.getElementById('close-alert-btn');

    // Функция для показа уведомления и редиректа
    loginBtn.addEventListener('click', (e) => {
        e.preventDefault(); // Останавливает моментальный переход, если кнопка в форме
        
        // Показываем уведомление
        alertBox.style.display = 'block';
        
        // Небольшая задержка для плавного появления (CSS transition)
        setTimeout(() => {
            alertBox.style.opacity = '1';
        }, 10);
        
        // Магия здесь: ждем 2 секунды (2000 мс) и перенаправляем на главную страницу
        setTimeout(() => {
            window.location.href ='index.html';
        }, 1000); 
    });

    // Функция для скрытия уведомления по крестику (если пользователь успеет нажать до редиректа)
    closeBtn.addEventListener('click', () => {
        alertBox.style.opacity = '0';
        setTimeout(() => {
            alertBox.style.display = 'none';
        }, 300); 
    });
});
    </script>
<div id="custom-alert" style="display: none; opacity: 0; transition: opacity 0.3s ease; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;">
